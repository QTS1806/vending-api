<!DOCTYPE html>
<html>
<head>
    <title>Vending Dashboard</title>
</head>
<body>
    <h1>Danh sách máy bán hàng</h1>

    <ul id="list"></ul>

    <script>
        async function loadData() {
            let res = await fetch("https://localhost:7288/api/Machines");
            let data = await res.json();

            let list = document.getElementById("list");
            list.innerHTML = "";

            data.forEach(m => {
                let li = document.createElement("li");
                li.innerText = m.name + " - " + m.status;
                list.appendChild(li);
            });
        }

        // chạy lần đầu
        loadData();

        // tự cập nhật mỗi 2 giây
        setInterval(loadData, 2000);
    </script>
</body>
</html>
